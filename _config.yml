# Hexo Configuration
title: 我的笔记
subtitle: 课堂笔记 & YouTube 技术分析
description: 课堂笔记 & YouTube 技术分析
keywords:
  - 笔记
  - 学习
  - 技术
author: shiwenbot
language: zh-CN
timezone: Asia/Shanghai
url: https://shiwenbot.github.io
root: /Notes/
permalink: :year/:month/:day/:title/

index_generator:
  order_by: -date

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories

# Writing
new_post_name: :title.md
default_layout: post
auto_spacing: true

# Pagination
per_page: 10
pagination_dir: page

# Theme
theme: fluid

# Deployment
deploy:
  type: ''

# Markdown
marked:
  prependRoot: true
  postAsset: true

# Date format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
