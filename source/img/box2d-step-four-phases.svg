<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      .label { font-family: 'Inter', sans-serif; font-size: 14px; fill: #6B5D52; font-weight: 500; }
      .title { font-family: 'Inter', sans-serif; font-size: 20px; fill: #3D3229; font-weight: 600; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: #8B7D72; font-weight: 400; }
      .step-num { font-family: 'Inter', sans-serif; font-size: 24px; fill: #FFFFFF; font-weight: 600; }
      .step-text { font-family: 'Inter', sans-serif; font-size: 16px; fill: #FFFFFF; font-weight: 500; }
      .step-desc { font-family: 'Inter', sans-serif; font-size: 12px; fill: #5C4E45; font-weight: 400; }
      .arrow { stroke: #A89A8F; stroke-width: 2; fill: none; }
    </style>

    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8956E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8855E;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C8268;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8C7258;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#806F62;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#705F52;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3D3229" flood-opacity="0.08"/>
    </filter>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#A89A8F"/>
    </marker>

  </defs>

  <rect width="1200" height="600" fill="#F8F6F3"/>

  <text x="40" y="250" class="label" transform="rotate(-90, 40, 250)" text-anchor="middle">PHYSICS WORKFLOW</text>

  <text x="120" y="60" class="title">Box2DSharp Step 执行流程</text>
  <text x="120" y="85" class="subtitle">物理模拟的心跳——四阶段驱动物理世界</text>

  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step1)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">1</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">事件清空</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">Event Clear</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">清空上一帧事件</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">防止读到旧数据</text>
  </g>

  <path d="M 330 240 L 370 240" class="arrow" marker-end="url(#arrowhead)"/>

  <g transform="translate(380, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step2)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">2</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">BroadPhase</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">粗检测更新</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">空间加速结构</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">创建碰撞配对</text>
  </g>

  <path d="M 590 240 L 630 240" class="arrow" marker-end="url(#arrowhead)"/>

  <g transform="translate(640, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step3)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">3</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">Collide</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">精细碰撞</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">更新接触状态</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">触发碰撞事件</text>
  </g>

  <path d="M 850 240 L 890 240" class="arrow" marker-end="url(#arrowhead)"/>

  <g transform="translate(900, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step4)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">4</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">Solve</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">约束求解</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">速度积分</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">位置积分</text>
  </g>

  <g transform="translate(120, 380)">
    <rect x="0" y="0" width="980" height="80" rx="8" fill="#FFFFFF" stroke="#E8E4E0" stroke-width="1"/>
    <text x="20" y="25" class="label" font-size="12" font-family="monospace">world.Step(timeStep, subStepCount)</text>
    <text x="20" y="50" class="subtitle" font-size="11">← 每帧调用，驱动物理世界前进</text>
    <text x="350" y="50" class="subtitle" font-size="11">← 四阶段：清空 → 粗检测 → 精碰撞 → 约束求解</text>
  </g>

</svg>