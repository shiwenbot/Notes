<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      .label { font-family: 'Inter', sans-serif; font-size: 14px; fill: #6B5D52; font-weight: 500; }
      .title { font-family: 'Inter', sans-serif; font-size: 24px; fill: #3D3229; font-weight: 700; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: #8B7D72; font-weight: 400; }
      .section-title { font-family: 'Inter', sans-serif; font-size: 18px; fill: #FFFFFF; font-weight: 700; }
      .field-name { font-family: 'Inter', sans-serif; font-size: 13px; fill: rgba(255,255,255,0.9); font-weight: 600; }
      .field-type { font-family: 'Monaco', 'Consolas', monospace; font-size: 11px; fill: rgba(255,255,255,0.7); font-weight: 400; }
      .field-desc { font-family: 'Inter', sans-serif; font-size: 11px; fill: rgba(255,255,255,0.75); font-weight: 400; }
      .phase-label { font-family: 'Inter', sans-serif; font-size: 16px; fill: #3D3229; font-weight: 700; }
      .phase-desc { font-family: 'Inter', sans-serif; font-size: 13px; fill: #6B5D52; font-weight: 400; }
      .arrow { stroke: #A89A8F; stroke-width: 2; fill: none; }
      .note { font-family: 'Inter', sans-serif; font-size: 11px; fill: #5C4E45; font-weight: 400; }
    </style>

    <linearGradient id="simGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#3D3229" flood-opacity:0.12"/>
    </filter>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#A89A8F"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#F8F6F3"/>

  <text x="60" y="50" class="title">BodySim vs BodyState：数据导向设计</text>
  <text x="60" y="75" class="subtitle">为什么要把数据拆成两半？——服务物理引擎的两个阶段</text>

  <!-- BodySim -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="480" height="380" rx="16" fill="url(#simGrad)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="480" height="60" rx="16" fill="rgba(0,0,0,0.2)"/>
    <rect x="0" y="40" width="480" height="20" fill="rgba(0,0,0,0.2)"/>

    <text x="240" y="38" class="section-title" text-anchor="middle">BodySim (仿真数据)</text>
    <text x="240" y="55" class="field-desc" text-anchor="middle" fill="rgba(255,255,255,0.9)">积分阶段需要的数据</text>

    <g transform="translate(25, 85)">
      <text x="0" y="0" class="field-name">Transform</text>
      <text x="0" y="18" class="field-type">Transform (位置、角度)</text>
      <text x="0" y="33" class="field-desc">刚体原点的世界坐标</text>

      <text x="0" y="65" class="field-name">Center</text>
      <text x="0" y="83" class="field-type">Vec2 (质心坐标)</text>
      <text x="0" y="98" class="field-desc">世界坐标系中的质心位置</text>

      <text x="0" y="130" class="field-name">LocalCenter</text>
      <text x="0" y="148" class="field-type">Vec2 (本地质心)</text>
      <text x="0" y="163" class="field-desc">相对于刚体原点的质心</text>

      <text x="0" y="195" class="field-name">InvMass, InvInertia</text>
      <text x="0" y="213" class="field-type">float (质量、转动惯量倒数)</text>
      <text x="0" y="228" class="field-desc">动力学核心参数</text>

      <text x="0" y="260" class="field-name">Force, Torque</text>
      <text x="0" y="278" class="field-type">Vec2, float (力、力矩)</text>
      <text x="0" y="293" class="field-desc">当前帧受的力和力矩</text>

      <text x="0" y="325" class="field-name">LinearDamping, AngularDamping</text>
      <text x="0" y="343" class="field-type">float (阻尼系数)</text>
      <text x="0" y="358" class="field-desc">速度衰减（模拟空气阻力）</text>
    </g>
  </g>

  <!-- BodyState -->
  <g transform="translate(660, 110)">
    <rect x="0" y="0" width="480" height="380" rx="16" fill="url(#stateGrad)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="480" height="60" rx="16" fill="rgba(0,0,0,0.2)"/>
    <rect x="0" y="40" width="480" height="20" fill="rgba(0,0,0,0.2)"/>

    <text x="240" y="38" class="section-title" text-anchor="middle">BodyState (状态数据)</text>
    <text x="240" y="55" class="field-desc" text-anchor="middle" fill="rgba(255,255,255,0.9)">求解阶段需要的数据（32字节紧凑结构）</text>

    <g transform="translate(25, 85)">
      <text x="0" y="0" class="field-name">LinearVelocity</text>
      <text x="0" y="18" class="field-type">Vec2 (线速度)</text>
      <text x="0" y="33" class="field-desc">当前线速度，ApplyImpulse直接改这里</text>

      <text x="0" y="65" class="field-name">AngularVelocity</text>
      <text x="0" y="83" class="field-type">float (角速度)</text>
      <text x="0" y="98" class="field-desc">当前角速度</text>

      <text x="0" y="130" class="field-name">DeltaPosition</text>
      <text x="0" y="148" class="field-type">Vec2 (位移增量)</text>
      <text x="0" y="163" class="field-desc">位置变化量</text>

      <text x="0" y="195" class="field-name">DeltaRotation</text>
      <text x="0" y="213" class="field-type">Rot (旋转增量)</text>
      <text x="0" y="228" class="field-desc">角度变化量</text>

      <text x="0" y="260" class="field-name">Flags</text>
      <text x="0" y="278" class="field-type">byte (状态标记)</text>
      <text x="0" y="293" class="field-desc">是否启用、是否睡眠等标记</text>

      <text x="0" y="325" class="field-name">UserIndex</text>
      <text x="0" y="343" class="field-type">byte (用户数据索引)</text>
      <text x="0" y="358" class="field-desc">关联用户定义数据</text>
    </g>
  </g>

  <!-- Phase 1: Integration -->
  <g transform="translate(60, 520)">
    <rect x="0" y="0" width="360" height="80" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="20" y="25" class="phase-label" fill="#1E40AF">积分阶段 (Integration)</text>
    <text x="20" y="50" class="phase-desc">需要：质量、力、阻尼、位置</text>
    <text x="20" y="68" class="note">读取 BodySim，计算加速度→速度→位置</text>
  </g>

  <!-- Phase 2: Constraint Solving -->
  <g transform="translate(480, 520)">
    <rect x="0" y="0" width="360" height="80" rx="12" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
    <text x="20" y="25" class="phase-label" fill="#5B21B6">约束求解阶段 (Solver)</text>
    <text x="20" y="50" class="phase-desc">需要：速度、位移增量、状态标记</text>
    <text x="20" y="68" class="note">高频迭代：反复读写 BodyState，修正速度</text>
  </g>

  <!-- Arrow from BodySim to Integration -->
  <path d="M 300 500 L 300 520" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Arrow from BodyState to Solver -->
  <path d="M 900 500 L 900 520" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Performance Note -->
  <g transform="translate(60, 620)">
    <rect x="0" y="0" width="1080" height="50" rx="8" fill="#FFFFFF" stroke="#E8E4E0" stroke-width="1"/>
    <text x="20" y="20" class="note" font-weight="600">数据导向优化原理：</text>
    <text x="20" y="38" class="note">BodyState 精确控制为 32 字节，匹配 CPU 缓存行（64字节）。一次内存加载可拿 2 个刚体状态，最大化缓存命中率。</text>
  </g>
</svg>
