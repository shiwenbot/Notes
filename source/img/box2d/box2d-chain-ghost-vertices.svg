<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550" width="700" height="550">
  <!-- 背景 -->
  <rect width="700" height="550" fill="#1a1b2e"/>

  <!-- 标题 -->
  <text x="350" y="40" text-anchor="middle" fill="#e0e6ed" font-size="24" font-weight="bold" font-family="Arial, sans-serif">
    ChainShape 幽灵顶点（Ghost Vertices）
  </text>

  <!-- 主图：链条形状 -->
  <g transform="translate(350, 200)">
    <!-- 地面线段序列 -->
    <polyline points="-250,50 -150,60 -50,40 50,65 150,45 250,55"
              fill="none" stroke="#61afef" stroke-width="3"/>

    <!-- 顶点 -->
    <circle cx="-250" cy="50" r="5" fill="#abb2bf"/>
    <circle cx="-150" cy="60" r="5" fill="#abb2bf"/>
    <circle cx="-50" cy="40" r="5" fill="#abb2bf"/>
    <circle cx="50" cy="65" r="5" fill="#abb2bf"/>
    <circle cx="150" cy="45" r="5" fill="#abb2bf"/>
    <circle cx="250" cy="55" r="5" fill="#abb2bf"/>

    <!-- 幽灵顶点标注（以线段2为例） -->
    <g transform="translate(-50, 40)">
      <!-- Ghost1 -->
      <circle cx="-100" cy="20" r="6" fill="#c678dd" stroke="#c678dd" stroke-width="2"/>
      <text x="-100" y="5" text-anchor="middle" fill="#c678dd" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Ghost1</text>
      <line x1="0" y1="0" x2="-100" y2="20" stroke="#c678dd" stroke-width="1.5" stroke-dasharray="4,2"/>

      <!-- Ghost2 -->
      <circle cx="100" cy="25" r="6" fill="#c678dd" stroke="#c678dd" stroke-width="2"/>
      <text x="100" y="10" text-anchor="middle" fill="#c678dd" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Ghost2</text>
      <line x1="0" y1="0" x2="100" y2="25" stroke="#c678dd" stroke-width="1.5" stroke-dasharray="4,2"/>

      <!-- 当前顶点 -->
      <circle cx="0" cy="0" r="6" fill="#61afef" stroke="#61afef" stroke-width="2"/>
      <text x="0" y="-15" text-anchor="middle" fill="#61afef" font-size="14" font-weight="bold" font-family="Arial, sans-serif">当前顶点</text>
    </g>

    <!-- 碰撞法线平滑过渡 -->
    <g transform="translate(-50, 0)">
      <!-- 前一个法线 -->
      <line x1="-80" y1="40" x2="-80" y2="-20" stroke="#98c379" stroke-width="2"/>
      <polygon points="-80,-20 -85,-10 -75,-10" fill="#98c379"/>
      <text x="-80" y="-30" text-anchor="middle" fill="#98c379" font-size="11" font-family="Arial, sans-serif">法线1</text>

      <!-- 当前法线（平滑过渡） -->
      <line x1="0" y1="40" x2="0" y2="-10" stroke="#e5c07b" stroke-width="2.5"/>
      <polygon points="0,-10 -5,0 5,0" fill="#e5c07b"/>
      <text x="0" y="-20" text-anchor="middle" fill="#e5c07b" font-size="11" font-family="Arial, sans-serif">法线2（平滑）</text>

      <!-- 后一个法线 -->
      <line x1="80" y1="65" x2="80" y2="5" stroke="#98c379" stroke-width="2"/>
      <polygon points="80,5 75,15 85,15" fill="#98c379"/>
      <text x="80" y="-5" text-anchor="middle" fill="#98c379" font-size="11" font-family="Arial, sans-serif">法线3</text>

      <!-- 平滑过渡曲线 -->
      <path d="M-80,-20 Q0,-35 80,5" fill="none" stroke="#e5c07b" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="0" y="-45" text-anchor="middle" fill="#e5c07b" font-size="12" font-weight="bold" font-family="Arial, sans-serif">平滑过渡</text>
    </g>

    <!-- 球滚动示意 -->
    <circle cx="-80" cy="-10" r="25" fill="none" stroke="#e06c75" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="0" cy="-5" r="25" fill="none" stroke="#e06c75" stroke-width="2" stroke-dasharray="5,3"/>
    <circle cx="80" cy="0" r="25" fill="none" stroke="#e06c75" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="0" y="-70" text-anchor="middle" fill="#e06c75" font-size="13" font-family="Arial, sans-serif">球平滑滚动</text>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(350, 420)">
    <rect x="-280" y="-30" width="560" height="100" rx="10" fill="#2c313c" stroke="#61afef" stroke-width="2"/>

    <text x="0" y="0" text-anchor="middle" fill="#98c379" font-size="16" font-weight="bold" font-family="Arial, sans-serif">
      ✓ 幽灵顶点的作用
    </text>

    <text x="0" y="30" text-anchor="middle" fill="#abb2bf" font-size="14" font-family="Arial, sans-serif">
      每个内部线段知道前后线段的位置
    </text>
    <text x="0" y="50" text-anchor="middle" fill="#abb2bf" font-size="14" font-family="Arial, sans-serif">
      碰撞法线在接缝处平滑过渡，避免被端点弹飞
    </text>
  </g>

  <!-- ChainShape 限制 -->
  <g transform="translate(350, 510)">
    <text x="0" y="0" text-anchor="middle" fill="#e5c07b" font-size="13" font-family="Arial, sans-serif">
      ⚠️ ChainShape 限制：only static | 无质量 | 单向碰撞 | 开放链首尾边无碰撞
    </text>
  </g>
</svg>
