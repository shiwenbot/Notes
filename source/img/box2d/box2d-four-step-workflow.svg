<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      .label { font-family: 'Inter', sans-serif; font-size: 14px; fill: #6B5D52; font-weight: 500; }
      .title { font-family: 'Inter', sans-serif; font-size: 20px; fill: #3D3229; font-weight: 600; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: #8B7D72; font-weight: 400; }
      .step-num { font-family: 'Inter', sans-serif; font-size: 24px; fill: #FFFFFF; font-weight: 600; }
      .step-text { font-family: 'Inter', sans-serif; font-size: 16px; fill: #FFFFFF; font-weight: 500; }
      .step-desc { font-family: 'Inter', sans-serif; font-size: 12px; fill: #5C4E45; font-weight: 400; }
      .arrow { stroke: #A89A8F; stroke-width: 2; fill: none; }
    </style>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8956E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8855E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9C8268;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8C7258;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#806F62;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#705F52;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3D3229" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#F8F6F3"/>

  <!-- Left Layer Label -->
  <text x="40" y="250" class="label" transform="rotate(-90, 40, 250)" text-anchor="middle">PHYSICS WORKFLOW</text>

  <!-- Title -->
  <text x="120" y="60" class="title">Box2DSharp 物理模拟工作流</text>
  <text x="120" y="85" class="subtitle">四步法创建并驱动物理世界</text>

  <!-- Step 1: CreateWorld -->
  <g transform="translate(120, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step1)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">1</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">CreateWorld</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">创建物理世界</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">初始化重力、边界</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">和世界参数</text>
  </g>

  <!-- Arrow 1-2 -->
  <path d="M 330 240 L 370 240" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Step 2: CreateBody -->
  <g transform="translate(380, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step2)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">2</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">CreateBody</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">创建刚体</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">定义位置、速度</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">和质量类型</text>
  </g>

  <!-- Arrow 2-3 -->
  <path d="M 590 240 L 630 240" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Step 3: CreateShape -->
  <g transform="translate(640, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step3)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">3</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">CreateShape</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">创建碰撞形状</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">附加几何形状</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">和物理材质</text>
  </g>

  <!-- Arrow 3-4 -->
  <path d="M 850 240 L 890 240" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Step -->
  <g transform="translate(900, 140)">
    <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#step4)" filter="url(#shadow)"/>
    <circle cx="40" cy="40" r="24" fill="rgba(255,255,255,0.2)"/>
    <text x="40" y="48" class="step-num" text-anchor="middle">4</text>
    <text x="100" y="90" class="step-text" text-anchor="middle" font-size="18">Step</text>
    <text x="100" y="120" class="step-text" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">步进模拟</text>
    <text x="100" y="160" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">每帧更新物理</text>
    <text x="100" y="178" class="step-desc" text-anchor="middle" fill="rgba(255,255,255,0.8)">计算位置和碰撞</text>
  </g>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#A89A8F"/>
    </marker>
  </defs>

  <!-- Code Example at Bottom -->
  <g transform="translate(120, 380)">
    <rect x="0" y="0" width="980" height="80" rx="8" fill="#FFFFFF" stroke="#E8E4E0" stroke-width="1"/>
    <text x="20" y="25" class="label" font-size="12" font-family="monospace">world.CreateBody(bodyDef)</text>
    <text x="280" y="25" class="label" font-size="12" font-family="monospace">.CreateFixture(shape)</text>
    <text x="520" y="25" class="label" font-size="12" font-family="monospace">world.Step(dt, velIter, posIter)</text>
    <text x="20" y="50" class="subtitle" font-size="11">← 链式调用构建刚体</text>
    <text x="280" y="50" class="subtitle" font-size="11">← 附加碰撞形状</text>
    <text x="520" y="50" class="subtitle" font-size="11">← 驱动物理模拟</text>
  </g>

  <!-- Right Legend -->
  <g transform="translate(1050, 420)">
    <text x="0" y="0" class="label" font-size="10" text-anchor="end">FLOW DIAGRAM</text>
    <text x="0" y="15" class="subtitle" font-size="9" text-anchor="end">Box2DSharp Initialization</text>
  </g>
</svg>