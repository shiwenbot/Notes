<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Arrow Markers -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>

    <!-- Gradients -->
    <linearGradient id="worldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shapeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stepGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#1f2937">
    Box2DSharp 四步工作流
  </text>
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">
    创建物理世界 → 创建刚体 → 创建碰撞形状 → 推进时间循环
  </text>

  <!-- Step 1: CreateWorld -->
  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="1000" height="100" rx="12" fill="url(#worldGradient)" filter="url(#shadow)"/>
    <text x="500" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="white">
      Step 1: CreateWorld（创建物理世界）
    </text>
    <text x="500" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">
      设置重力（Gravity）、时间步长、迭代次数等全局参数
    </text>
  </g>

  <!-- Arrow 1 -->
  <line x1="600" y1="230" x2="600" y2="270" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="520" y="235" width="160" height="24" rx="4" fill="white" opacity="0.95"/>
  <text x="600" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#2563eb">
    world = new World()
  </text>

  <!-- Step 2: CreateBody (with container) -->
  <rect x="80" y="280" width="1040" height="140" rx="8" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="90" y="305" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#059669">
    Step 2: CreateBody（创建刚体）
  </text>

  <!-- Body 1 -->
  <g transform="translate(130, 320)">
    <rect x="0" y="0" width="280" height="80" rx="10" fill="url(#bodyGradient)" filter="url(#shadow)"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">
      Body 1: 玩家
    </text>
    <text x="140" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      类型：Dynamic（动态）
    </text>
    <text x="140" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">
      质量：10kg | 位置：(0, 5)
    </text>
  </g>

  <!-- Body 2 -->
  <g transform="translate(460, 320)">
    <rect x="0" y="0" width="280" height="80" rx="10" fill="url(#bodyGradient)" filter="url(#shadow)"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">
      Body 2: 敌人
    </text>
    <text x="140" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      类型：Dynamic（动态）
    </text>
    <text x="140" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">
      质量：15kg | 位置：(3, 2)
    </text>
  </g>

  <!-- Body 3 -->
  <g transform="translate(790, 320)">
    <rect x="0" y="0" width="280" height="80" rx="10" fill="url(#bodyGradient)" filter="url(#shadow)"/>
    <text x="140" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="white">
      Body 3: 地面
    </text>
    <text x="140" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)">
      类型：Static（静态）
    </text>
    <text x="140" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">
      质量：∞ | 位置：(0, 0)
    </text>
  </g>

  <!-- Arrows 2 (World to Bodies) -->
  <line x1="300" y1="230" x2="250" y2="315" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="600" y1="230" x2="600" y2="315" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="900" y1="230" x2="950" y2="315" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 3: CreateShape (attached to Bodies) -->
  <!-- Shape 1.1 (Circle) -->
  <g transform="translate(140, 450)">
    <rect x="0" y="0" width="120" height="70" rx="8" fill="url(#shapeGradient)" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white">
      Shape 1.1
    </text>
    <text x="60" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">
      Circle（圆形）
    </text>
    <text x="60" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">
      半径：0.5m
    </text>
  </g>

  <!-- Shape 1.2 (Polygon) -->
  <g transform="translate(280, 450)">
    <rect x="0" y="0" width="120" height="70" rx="8" fill="url(#shapeGradient)" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white">
      Shape 1.2
    </text>
    <text x="60" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">
      Polygon（多边形）
    </text>
    <text x="60" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">
      碰撞传感器
    </text>
  </g>

  <!-- Shape 2.1 (Box) -->
  <g transform="translate(540, 450)">
    <rect x="0" y="0" width="120" height="70" rx="8" fill="url(#shapeGradient)" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white">
      Shape 2.1
    </text>
    <text x="60" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">
      Box（矩形）
    </text>
    <text x="60" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">
      1×1 米
    </text>
  </g>

  <!-- Shape 3.1 (Edge) -->
  <g transform="translate(870, 450)">
    <rect x="0" y="0" width="120" height="70" rx="8" fill="url(#shapeGradient)" filter="url(#shadow)"/>
    <text x="60" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="white">
      Shape 3.1
    </text>
    <text x="60" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.9)">
      Edge（线段）
    </text>
    <text x="60" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">
      地面线段
    </text>
  </g>

  <!-- Arrows 3 (Bodies to Shapes) -->
  <line x1="200" y1="400" x2="200" y2="445" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="340" y1="400" x2="340" y2="445" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="600" y1="400" x2="600" y2="445" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="930" y1="400" x2="930" y2="445" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Label for Step 3 -->
  <text x="100" y="480" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#d97706">
    Step 3:
  </text>
  <text x="100" y="500" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">
    CreateShape
  </text>
  <text x="100" y="518" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">
    （创建碰撞形状）
  </text>

  <!-- Step 4: Step (Loop) -->
  <g transform="translate(100, 560)">
    <rect x="0" y="0" width="1000" height="120" rx="12" fill="url(#stepGradient)" filter="url(#shadow)"/>
    <text x="500" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="white">
      Step 4: Step（推进时间）
    </text>
    <text x="500" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">
      执行碰撞检测（Broad Phase + Narrow Phase）+ 物理求解（位置修正、速度更新）
    </text>
    <text x="500" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.85)">
      world.Step(timeStep: 1/60f, velocityIterations: 8, positionIterations: 3)
    </text>
    <text x="500" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">
      ⚠️ 每帧调用一次（通常在 Update() 或 FixedUpdate() 中）
    </text>
  </g>

  <!-- Loop Arrow (Step back to top) -->
  <path d="M 1100 620 Q 1150 620, 1150 500 Q 1150 180, 1100 180" stroke="#7c3aed" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <rect x="1115" y="380" width="70" height="24" rx="4" fill="white" opacity="0.95"/>
  <text x="1150" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#7c3aed">
    每帧循环
  </text>

  <!-- Legend -->
  <g transform="translate(100, 720)">
    <rect x="0" y="0" width="15" height="15" rx="3" fill="url(#worldGradient)"/>
    <text x="25" y="12" font-family="system-ui, sans-serif" font-size="12" fill="#374151">World（物理世界）</text>
    <rect x="160" y="0" width="15" height="15" rx="3" fill="url(#bodyGradient)"/>
    <text x="185" y="12" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Body（刚体）</text>
    <rect x="290" y="0" width="15" height="15" rx="3" fill="url(#shapeGradient)"/>
    <text x="315" y="12" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Shape（碰撞形状）</text>
    <rect x="450" y="0" width="15" height="15" rx="3" fill="url(#stepGradient)"/>
    <text x="475" y="12" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Step（时间推进）</text>
  </g>

  <!-- Relationship Note -->
  <text x="800" y="735" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">
    💡 一个 World 包含多个 Body，每个 Body 可以挂载多个 Shape
  </text>

</svg>