<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      .label { font-family: 'Inter', sans-serif; font-size: 14px; fill: #6B5D52; font-weight: 500; }
      .title { font-family: 'Inter', sans-serif; font-size: 24px; fill: #3D3229; font-weight: 700; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: #8B7D72; font-weight: 400; }
      .type-title { font-family: 'Inter', sans-serif; font-size: 20px; fill: #FFFFFF; font-weight: 700; }
      .type-subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: rgba(255,255,255,0.9); font-weight: 500; }
      .feature-label { font-family: 'Inter', sans-serif; font-size: 13px; fill: rgba(255,255,255,0.85); font-weight: 400; }
      .feature-value { font-family: 'Inter', sans-serif; font-size: 15px; fill: #FFFFFF; font-weight: 600; }
      .scenario { font-family: 'Inter', sans-serif; font-size: 12px; fill: rgba(255,255,255,0.75); font-weight: 400; }
      .note { font-family: 'Inter', sans-serif; font-size: 11px; fill: #5C4E45; font-weight: 400; font-style: italic; }
    </style>

    <linearGradient id="staticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B5563;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="kinematicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="dynamicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3D3229" flood-opacity:0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#F8F6F3"/>

  <text x="60" y="50" class="title">Box2DSharp BodyType 三种类型</text>
  <text x="60" y="75" class="subtitle">刚体的三种身份，决定它们在物理世界中的行为模式</text>

  <!-- StaticBody -->
  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="340" height="520" rx="20" fill="url(#staticGrad)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="80" rx="20" fill="rgba(0,0,0,0.2)"/>
    <rect x="0" y="60" width="340" height="20" fill="rgba(0,0,0,0.2)"/>

    <text x="170" y="45" class="type-title" text-anchor="middle">StaticBody</text>
    <text x="170" y="68" class="type-subtitle" text-anchor="middle">静态刚体</text>

    <g transform="translate(30, 110)">
      <text x="0" y="0" class="feature-label">质量 (Mass)</text>
      <text x="0" y="25" class="feature-value">零 (InvMass = 0)</text>

      <text x="0" y="70" class="feature-label">速度来源</text>
      <text x="0" y="95" class="feature-value">无 (手动改位置)</text>

      <text x="0" y="140" class="feature-label">受力响应</text>
      <text x="0" y="165" class="feature-value">完全忽略</text>

      <text x="0" y="210" class="feature-label">碰撞影响</text>
      <text x="0" y="235" class="feature-value">不会被推走</text>

      <text x="0" y="280" class="feature-label">适用场景</text>
      <text x="0" y="305" class="scenario">• 地面、墙壁</text>
      <text x="0" y="325" class="scenario">• 固定平台</text>
      <text x="0" y="345" class="scenario">• 障碍物</text>

      <text x="0" y="390" class="feature-label">关键特性</text>
      <text x="0" y="415" class="scenario">质量无穷大</text>
      <text x="0" y="435" class="scenario">永远不会动</text>
      <text x="0" y="455" class="scenario">不参与碰撞响应</text>
    </g>
  </g>

  <!-- KinematicBody -->
  <g transform="translate(430, 110)">
    <rect x="0" y="0" width="340" height="520" rx="20" fill="url(#kinematicGrad)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="80" rx="20" fill="rgba(0,0,0,0.2)"/>
    <rect x="0" y="60" width="340" height="20" fill="rgba(0,0,0,0.2)"/>

    <text x="170" y="45" class="type-title" text-anchor="middle">KinematicBody</text>
    <text x="170" y="68" class="type-subtitle" text-anchor="middle">运动刚体</text>

    <g transform="translate(30, 110)">
      <text x="0" y="0" class="feature-label">质量 (Mass)</text>
      <text x="0" y="25" class="feature-value">零 (InvMass = 0)</text>

      <text x="0" y="70" class="feature-label">速度来源</text>
      <text x="0" y="95" class="feature-value">用户代码设定</text>

      <text x="0" y="140" class="feature-label">受力响应</text>
      <text x="0" y="165" class="feature-value">完全忽略</text>

      <text x="0" y="210" class="feature-label">碰撞影响</text>
      <text x="0" y="235" class="feature-value">速度不变，但能推 Dynamic</text>

      <text x="0" y="280" class="feature-label">适用场景</text>
      <text x="0" y="305" class="scenario">• 电梯、升降平台</text>
      <text x="0" y="325" class="scenario">• 传送带</text>
      <text x="0" y="345" class="scenario">• 玩家控制的移动平台</text>

      <text x="0" y="390" class="feature-label">关键特性</text>
      <text x="0" y="415" class="scenario">按设定速度移动</text>
      <text x="0" y="435" class="scenario">不会被碰撞改变速度</text>
      <text x="0" y="455" class="scenario">能推开 DynamicBody</text>
    </g>
  </g>

  <!-- DynamicBody -->
  <g transform="translate(800, 110)">
    <rect x="0" y="0" width="340" height="520" rx="20" fill="url(#dynamicGrad)" filter="url(#shadow)"/>
    <rect x="0" y="0" width="340" height="80" rx="20" fill="rgba(0,0,0,0.2)"/>
    <rect x="0" y="60" width="340" height="20" fill="rgba(0,0,0,0.2)"/>

    <text x="170" y="45" class="type-title" text-anchor="middle">DynamicBody</text>
    <text x="170" y="68" class="type-subtitle" text-anchor="middle">动态刚体</text>

    <g transform="translate(30, 110)">
      <text x="0" y="0" class="feature-label">质量 (Mass)</text>
      <text x="0" y="25" class="feature-value">正质量 (InvMass > 0)</text>

      <text x="0" y="70" class="feature-label">速度来源</text>
      <text x="0" y="95" class="feature-value">力和冲量驱动</text>

      <text x="0" y="140" class="feature-label">受力响应</text>
      <text x="0" y="165" class="feature-value">完全响应</text>

      <text x="0" y="210" class="feature-label">碰撞影响</text>
      <text x="0" y="235" class="feature-value">会反弹、摩擦、改变速度</text>

      <text x="0" y="280" class="feature-label">适用场景</text>
      <text x="0" y="305" class="scenario">• 箱子、球体</text>
      <text x="0" y="325" class="scenario">• 玩家角色</text>
      <text x="0" y="345" class="scenario">• 敌人、NPC</text>

      <text x="0" y="390" class="feature-label">关键特性</text>
      <text x="0" y="415" class="scenario">符合牛顿定律</text>
      <text x="0" y="435" class="scenario">会被碰撞改变速度</text>
      <text x="0" y="455" class="scenario">能被 Static/Kinematic 推走</text>
    </g>
  </g>

  <!-- Bottom Note -->
  <g transform="translate(60, 650)">
    <rect x="0" y="0" width="1080" height="40" rx="8" fill="#FFFFFF" stroke="#E8E4E0" stroke-width="1"/>
    <text x="20" y="25" class="note">核心区别：InvMass = 0 (Static/Kinematic) vs InvMass > 0 (Dynamic) → 决定了加速度 a = F × InvMass 是否为 0</text>
  </g>
</svg>
