<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      .label { font-family: 'Inter', sans-serif; font-size: 14px; fill: #6B5D52; font-weight: 500; }
      .title { font-family: 'Inter', sans-serif; font-size: 20px; fill: #3D3229; font-weight: 600; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 14px; fill: #8B7D72; font-weight: 400; }
      .code { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; fill: #5C4E45; }
      .tag { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; }
      .box-label { font-family: 'Inter', sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 500; }
      .revision-num { font-family: 'Inter', sans-serif; font-size: 28px; fill: #FFFFFF; font-weight: 600; }
    </style>
    <linearGradient id="valid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7BA574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A9563;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stale" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A57474;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#956363;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="new" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3D3229" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#F8F6F3"/>

  <!-- Left Layer Label -->
  <text x="40" y="300" class="label" transform="rotate(-90, 40, 300)" text-anchor="middle">MEMORY SAFETY</text>

  <!-- Title -->
  <text x="120" y="60" class="title">BodyId Revision 机制</text>
  <text x="120" y="85" class="subtitle">版本号检测防止访问已释放的刚体（野指针问题）</text>

  <!-- Structure Definition -->
  <g transform="translate(120, 130)">
    <rect x="0" y="0" width="300" height="120" rx="12" fill="#FFFFFF" stroke="#E8E4E0" stroke-width="2"/>
    <text x="20" y="30" class="label" font-size="12">BodyId 结构（4 bytes）</text>
    <line x1="20" y1="45" x2="280" y2="45" stroke="#E8E4E0" stroke-width="1"/>
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="100" height="35" rx="6" fill="#A89A8F"/>
      <text x="50" y="22" class="tag" fill="white" text-anchor="middle">Index</text>
    </g>
    <g transform="translate(150, 70)">
      <rect x="0" y="0" width="100" height="35" rx="6" fill="#806F62"/>
      <text x="50" y="22" class="tag" fill="white" text-anchor="middle">Revision</text>
    </g>
  </g>

  <!-- Arrow pointing to explanation -->
  <path d="M 450 190 L 490 190" stroke="#A89A8F" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <text x="470" y="175" class="subtitle" font-size="11" text-anchor="middle">低16位</text>
  <text x="470" y="220" class="subtitle" font-size="11" text-anchor="middle">高16位</text>

  <!-- Scenario Timeline -->
  <g transform="translate(120, 300)">
    <text x="0" y="-15" class="label" font-size="16">生命周期场景</text>

    <!-- Time 1: Create -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#new)" filter="url(#shadow)"/>
      <text x="20" y="30" class="box-label" font-size="11" fill="rgba(255,255,255,0.8)">时刻 1: 创建刚体</text>
      <text x="100" y="65" class="revision-num" text-anchor="middle">5</text>
      <text x="100" y="85" class="box-label" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Revision = 5</text>
    </g>

    <!-- Arrow -->
    <path d="M 210 70 L 250 70" stroke="#A89A8F" stroke-width="2" marker-end="url(#arrowhead2)"/>
    <text x="230" y="60" class="subtitle" font-size="10" text-anchor="middle">用户持有</text>
    <text x="230" y="95" class="subtitle" font-size="10" text-anchor="middle">BodyId</text>

    <!-- Time 2: Destroy -->
    <g transform="translate(260, 20)">
      <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#stale)" filter="url(#shadow)"/>
      <text x="20" y="30" class="box-label" font-size="11" fill="rgba(255,255,255,0.8)">时刻 2: 刚体被销毁</text>
      <text x="100" y="65" class="revision-num" text-anchor="middle">5</text>
      <text x="100" y="85" class="box-label" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">Revision++ → 6</text>
    </g>

    <!-- Arrow -->
    <path d="M 470 70 L 510 70" stroke="#A89A8F" stroke-width="2" marker-end="url(#arrowhead2)"/>

    <!-- Time 3: User Access -->
    <g transform="translate(520, 20)">
      <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#stale)" filter="url(#shadow)"/>
      <text x="20" y="30" class="box-label" font-size="11" fill="rgba(255,255,255,0.8)">时刻 3: 用户尝试访问</text>
      <text x="100" y="55" class="revision-num" text-anchor="middle" font-size="24">5 ≠ 6</text>
      <text x="100" y="85" class="box-label" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">版本号不匹配！</text>
    </g>

    <!-- Arrow -->
    <path d="M 730 70 L 770 70" stroke="#A89A8F" stroke-width="2" marker-end="url(#arrowhead2)"/>

    <!-- Time 4: Safe Return -->
    <g transform="translate(780, 20)">
      <rect x="0" y="0" width="200" height="100" rx="12" fill="url(#valid)" filter="url(#shadow)"/>
      <text x="20" y="30" class="box-label" font-size="11" fill="rgba(255,255,255,0.8)">时刻 4: 安全处理</text>
      <text x="100" y="55" class="box-label" font-size="14" text-anchor="middle" fill="white">返回默认值</text>
      <text x="100" y="80" class="box-label" font-size="10" text-anchor="middle" fill="rgba(255,255,255,0.9)">或抛出异常</text>
    </g>
  </g>

  <!-- Key Insight Box -->
  <g transform="translate(120, 460)">
    <rect x="0" y="0" width="860" height="80" rx="12" fill="#FFFFFF" stroke="#D4A574" stroke-width="2"/>
    <text x="20" y="25" class="label" font-size="13" fill="#D4A574">💡 核心优势</text>
    <text x="20" y="50" class="code">每次 DestroyBody 时 Revision++，用户持有的旧 BodyId 因版本号不匹配而失效</text>
    <text x="20" y="68" class="subtitle" font-size="11">无需追踪指针，完全避免悬垂指针导致的内存错误</text>
  </g>

  <!-- Code Example -->
  <g transform="translate(120, 560)">
    <text x="0" y="0" class="code" font-size="12">bool IsValid(BodyId id) { return id.Revision == bodies[id.Index].Revision; }</text>
  </g>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#A89A8F"/>
    </marker>
  </defs>

</svg>