<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Neon Arrow Markers -->
    <marker id="arrow-neon-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff9d"/>
    </marker>
    <marker id="arrow-neon-pink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff00ff"/>
    </marker>
    <marker id="arrow-neon-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ffff"/>
    </marker>

    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="slot-active" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff9d;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00ff9d;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="slot-empty" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0055;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ff0055;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0f0f1a"/>

  <!-- Grid Pattern (Terminal Style) -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a2e" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="monospace" font-size="26" font-weight="bold" fill="#00ff9d" filter="url(#neon-glow)">
    BodyId Revision 版本号防野指针机制
  </text>
  <text x="600" y="80" text-anchor="middle" font-family="monospace" font-size="13" fill="#8888ff">
    类似 Git commit hash：每个槽位重用时，revision 自增，旧 ID 自动失效
  </text>

  <!-- Git Analogy Box -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="1040" height="60" rx="8" fill="none" stroke="#ff00ff" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="20" y="25" font-family="monospace" font-size="13" fill="#ff00ff" font-weight="bold">💡 Git 类比：</text>
    <text x="20" y="45" font-family="monospace" font-size="12" fill="#cccccc">
      commit abc123f (Revision:1) → 删除分支 → 新 commit def456g (Revision:2，但仍是同一个槽位)
    </text>
    <text x="700" y="45" font-family="monospace" font-size="12" fill="#00ff9d">
      旧的 abc123f 无法 checkout 到新代码 ✗
    </text>
  </g>

  <!-- Timeline Headers -->
  <g transform="translate(0, 200)">
    <text x="200" y="0" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#00ffff">
      T1: 创建 Body
    </text>
    <text x="200" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#8888ff">
      world.CreateBody()
    </text>

    <text x="500" y="0" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#ff0055">
      T2: 销毁 Body
    </text>
    <text x="500" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#8888ff">
      body.Destroy()
    </text>

    <text x="800" y="0" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#00ff9d">
      T3: 创建新 Body
    </text>
    <text x="800" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#8888ff">
      world.CreateBody() (复用槽位[5])
    </text>
  </g>

  <!-- BodyArray Slots (3 columns) -->
  <!-- T1 Slot -->
  <g transform="translate(100, 260)">
    <rect x="0" y="0" width="200" height="180" rx="8" fill="url(#slot-active)" stroke="#00ff9d" stroke-width="2" filter="url(#neon-glow)"/>
    <text x="100" y="25" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff9d">
      BodyArray[5]
    </text>

    <!-- Slot Content -->
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-family="monospace" font-size="13" fill="#00ffff">Index:    6</text>
      <text x="0" y="25" font-family="monospace" font-size="13" fill="#ff00ff">Revision: 1</text>
      <text x="0" y="50" font-family="monospace" font-size="13" fill="#ffff00">Data:     Player A</text>
      <text x="0" y="75" font-family="monospace" font-size="13" fill="#aaaaaa">Position: (0, 5)</text>
      <text x="0" y="100" font-family="monospace" font-size="13" fill="#aaaaaa">Mass:     10kg</text>
    </g>

    <rect x="10" y="120" width="180" height="50" rx="4" fill="#00ff9d" fill-opacity="0.2" stroke="#00ff9d" stroke-width="1"/>
    <text x="100" y="140" text-anchor="middle" font-family="monospace" font-size="12" fill="#00ff9d" font-weight="bold">
      BodyId {6, 1}
    </text>
    <text x="100" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#cccccc">
      ✅ 有效
    </text>
  </g>

  <!-- Arrow T1 to T2 -->
  <g transform="translate(320, 340)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#ff0055" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow-neon-pink)"/>
    <text x="30" y="-10" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff0055">
      Destroy
    </text>
  </g>

  <!-- T2 Slot (Empty) -->
  <g transform="translate(400, 260)">
    <rect x="0" y="0" width="200" height="180" rx="8" fill="url(#slot-empty)" stroke="#ff0055" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="100" y="25" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ff0055">
      BodyArray[5]
    </text>

    <!-- Empty Content -->
    <g transform="translate(20, 80)">
      <text x="80" y="0" text-anchor="middle" font-family="monospace" font-size="16" fill="#ff0055" font-weight="bold">
        ❌ EMPTY
      </text>
      <text x="80" y="25" text-anchor="middle" font-family="monospace" font-size="12" fill="#888888">
        槽位已释放
      </text>
      <text x="80" y="45" text-anchor="middle" font-family="monospace" font-size="11" fill="#666666">
        (可复用)
      </text>
    </g>

    <rect x="10" y="120" width="180" height="50" rx="4" fill="#ff0055" fill-opacity="0.1" stroke="#ff0055" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="100" y="140" text-anchor="middle" font-family="monospace" font-size="12" fill="#ff0055" font-weight="bold">
      BodyId {6, 1}
    </text>
    <text x="100" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#cccccc">
      ⚠️ 已失效
    </text>
  </g>

  <!-- Arrow T2 to T3 -->
  <g transform="translate(620, 340)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#00ff9d" stroke-width="2" marker-end="url(#arrow-neon-green)"/>
    <text x="30" y="-10" text-anchor="middle" font-family="monospace" font-size="11" fill="#00ff9d">
      Create
    </text>
  </g>

  <!-- T3 Slot (New Body) -->
  <g transform="translate(700, 260)">
    <rect x="0" y="0" width="200" height="180" rx="8" fill="url(#slot-active)" stroke="#00ff9d" stroke-width="2" filter="url(#neon-glow)"/>
    <text x="100" y="25" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff9d">
      BodyArray[5]
    </text>

    <!-- Slot Content -->
    <g transform="translate(20, 45)">
      <text x="0" y="0" font-family="monospace" font-size="13" fill="#00ffff">Index:    6</text>
      <text x="0" y="25" font-family="monospace" font-size="13" fill="#ff00ff">Revision: 2</text>
      <text x="0" y="50" font-family="monospace" font-size="13" fill="#ffff00">Data:     Enemy B</text>
      <text x="0" y="75" font-family="monospace" font-size="13" fill="#aaaaaa">Position: (3, 2)</text>
      <text x="0" y="100" font-family="monospace" font-size="13" fill="#aaaaaa">Mass:     15kg</text>
    </g>

    <rect x="10" y="120" width="180" height="50" rx="4" fill="#00ff9d" fill-opacity="0.2" stroke="#00ff9d" stroke-width="1"/>
    <text x="100" y="140" text-anchor="middle" font-family="monospace" font-size="12" fill="#00ff9d" font-weight="bold">
      BodyId {6, 2}
    </text>
    <text x="100" y="158" text-anchor="middle" font-family="monospace" font-size="10" fill="#cccccc">
      ✅ 有效（新 ID）
    </text>
  </g>

  <!-- Access Examples Section -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="1040" height="280" rx="8" fill="#1a1a2e" fill-opacity="0.8" stroke="#8888ff" stroke-width="1"/>

    <text x="520" y="30" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#8888ff">
      访问验证示例（T3 时刻）
    </text>

    <!-- Example 1: Old ID Access (FAIL) -->
    <g transform="translate(40, 60)">
      <rect x="0" y="0" width="440" height="100" rx="6" fill="#ff0055" fill-opacity="0.1" stroke="#ff0055" stroke-width="2"/>

      <text x="20" y="25" font-family="monospace" font-size="13" fill="#ff0055" font-weight="bold">
        ❌ 旧 BodyId {Index:6, Revision:1} 访问失败
      </text>

      <g transform="translate(20, 40)">
        <text x="0" y="0" font-family="monospace" font-size="11" fill="#cccccc">检查：</text>
        <text x="0" y="18" font-family="monospace" font-size="11" fill="#aaaaaa">  if (slot.Revision(2) != id.Revision(1))</text>
        <text x="0" y="36" font-family="monospace" font-size="11" fill="#00ff9d">  → ❌ 版本不匹配！返回 null/抛异常</text>
      </g>

      <text x="420" y="85" text-anchor="end" font-family="monospace" font-size="20" fill="#ff0055">✗</text>
    </g>

    <!-- Example 2: New ID Access (SUCCESS) -->
    <g transform="translate(560, 60)">
      <rect x="0" y="0" width="440" height="100" rx="6" fill="#00ff9d" fill-opacity="0.1" stroke="#00ff9d" stroke-width="2"/>

      <text x="20" y="25" font-family="monospace" font-size="13" fill="#00ff9d" font-weight="bold">
        ✅ 新 BodyId {Index:6, Revision:2} 访问成功
      </text>

      <g transform="translate(20, 40)">
        <text x="0" y="0" font-family="monospace" font-size="11" fill="#cccccc">检查：</text>
        <text x="0" y="18" font-family="monospace" font-size="11" fill="#aaaaaa">  if (slot.Revision(2) == id.Revision(2))</text>
        <text x="0" y="36" font-family="monospace" font-size="11" fill="#00ff9d">  → ✅ 版本匹配！返回 slot.Data</text>
      </g>

      <text x="420" y="85" text-anchor="end" font-family="monospace" font-size="20" fill="#00ff9d">✓</text>
    </g>

    <!-- Key Takeaways -->
    <g transform="translate(40, 180)">
      <rect x="0" y="0" width="960" height="80" rx="6" fill="#ffff00" fill-opacity="0.05" stroke="#ffff00" stroke-width="1"/>

      <text x="480" y="25" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#ffff00">
        🎯 核心原理
      </text>

      <g transform="translate(30, 40)">
        <text x="0" y="0" font-family="monospace" font-size="12" fill="#cccccc">
          1. 每次销毁后重新创建，Revision 自动 +1（类似 Git commit hash 自增）
        </text>
        <text x="0" y="18" font-family="monospace" font-size="12" fill="#cccccc">
          2. 野指针持有旧 Revision，访问时版本不匹配 → 自动失效，防止访问错误数据
        </text>
        <text x="0" y="36" font-family="monospace" font-size="12" fill="#cccccc">
          3. 零开销安全：只需一次整数比较，比智能指针更轻量
        </text>
      </g>
    </g>
  </g>

  <!-- Footer Note -->
  <text x="600" y="785" text-anchor="middle" font-family="monospace" font-size="11" fill="#666666">
    💡 应用场景：游戏实体管理、ECS 架构、对象池、网络同步（防止延迟包访问旧实体）
  </text>

</svg>