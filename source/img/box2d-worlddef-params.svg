<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap");
      .label { font-family: "Inter", sans-serif; font-size: 14px; fill: #6B5D52; font-weight: 500; }
      .title { font-family: "Inter", sans-serif; font-size: 20px; fill: #3D3229; font-weight: 600; }
      .subtitle { font-family: "Inter", sans-serif; font-size: 14px; fill: #8B7D72; font-weight: 400; }
      .code { font-family: "SF Mono", "Consolas", monospace; font-size: 12px; fill: #5C4E45; }
      .param-label { font-family: "Inter", sans-serif; font-size: 13px; fill: #FFFFFF; font-weight: 500; }
    </style>

    <linearGradient id="grad-physics" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7BA574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A9563;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="grad-contact" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7492A5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#638295;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="grad-joint" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A57474;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#956363;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="grad-perf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4956A;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3D3229" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="#F8F6F3"/>

  <text x="40" y="350" class="label" transform="rotate(-90, 40, 350)" text-anchor="middle">WORLDDEF</text>

  <text x="120" y="60" class="title">WorldDef 核心参数分类</text>
  <text x="120" y="85" class="subtitle">物理世界的出生证明——12个核心参数按功能分类</text>

  <g transform="translate(120, 130)">
    <rect x="0" y="0" width="320" height="180" rx="12" fill="url(#grad-physics)" filter="url(#shadow)"/>
    <text x="20" y="30" class="param-label" font-size="15">物理环境</text>
    <line x1="20" y1="45" x2="300" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="20" y="70" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">Gravity</text>
    <text x="20" y="88" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">全局重力向量 (0, -10)</text>
    <text x="20" y="110" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">MaximumLinearVelocity</text>
    <text x="20" y="128" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">最大线速度 (400 m/s)</text>
    <text x="20" y="150" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">RestitutionThreshold</text>
    <text x="20" y="168" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">弹性生效阈值 (1 m/s)</text>
  </g>

  <g transform="translate(470, 130)">
    <rect x="0" y="0" width="320" height="180" rx="12" fill="url(#grad-contact)" filter="url(#shadow)"/>
    <text x="20" y="30" class="param-label" font-size="15">接触约束</text>
    <line x1="20" y1="45" x2="300" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="20" y="70" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">ContactHertz</text>
    <text x="20" y="88" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">接触刚度频率 (30 Hz)</text>
    <text x="20" y="110" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">ContactDampingRatio</text>
    <text x="20" y="128" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">接触阻尼比 (10.0)</text>
    <text x="20" y="150" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">ContactPushoutVelocity</text>
    <text x="20" y="168" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">穿透修正速度 (3 m/s)</text>
  </g>

  <g transform="translate(820, 130)">
    <rect x="0" y="0" width="320" height="180" rx="12" fill="url(#grad-joint)" filter="url(#shadow)"/>
    <text x="20" y="30" class="param-label" font-size="15">关节约束</text>
    <line x1="20" y1="45" x2="300" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="20" y="70" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">JointHertz</text>
    <text x="20" y="88" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">关节刚度频率 (60 Hz)</text>
    <text x="20" y="110" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">JointDampingRatio</text>
    <text x="20" y="128" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">关节阻尼比 (2.0)</text>
    <text x="20" y="150" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">HitEventThreshold</text>
    <text x="20" y="168" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">命中事件阈值 (1 m/s)</text>
  </g>

  <g transform="translate(120, 340)">
    <rect x="0" y="0" width="320" height="140" rx="12" fill="url(#grad-perf)" filter="url(#shadow)"/>
    <text x="20" y="30" class="param-label" font-size="15">性能优化</text>
    <line x1="20" y1="45" x2="300" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="20" y="70" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">EnableSleep</text>
    <text x="20" y="88" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">休眠机制 (true)</text>
    <text x="20" y="110" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">EnableContinuous</text>
    <text x="20" y="128" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">连续碰撞检测 (true)</text>
  </g>

  <g transform="translate(470, 340)">
    <rect x="0" y="0" width="320" height="140" rx="12" fill="#806F62" filter="url(#shadow)"/>
    <text x="20" y="30" class="param-label" font-size="15">并行计算</text>
    <line x1="20" y1="45" x2="300" y2="45" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="20" y="70" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">WorkerCount</text>
    <text x="20" y="88" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">工作线程数 (1)</text>
    <text x="20" y="110" class="param-label" font-size="11" fill="rgba(255,255,255,0.9)">EnqueueTask / FinishTask</text>
    <text x="20" y="128" class="param-label" font-size="10" fill="rgba(255,255,255,0.7)">任务调度回调函数</text>
  </g>

  <g transform="translate(120, 510)">
    <rect x="0" y="0" width="860" height="100" rx="12" fill="#FFFFFF" stroke="#E8E4E0" stroke-width="2"/>
    <text x="20" y="25" class="label" font-size="13" fill="#D4A574">💡 使用建议</text>
    <text x="20" y="50" class="code">var def = WorldDef.DefaultWorldDef();</text>
    <text x="20" y="68" class="code">def.Gravity = new Vec2(0, -10);  // 自定义重力</text>
    <text x="20" y="86" class="code">WorldId world = World.CreateWorld(def);</text>
  </g>

</svg>